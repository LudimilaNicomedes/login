<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
     <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="container">
            <h1>Create Account</h1>
            <p class="texto">Join us to boost your productivity with <span class="destaque">Tuga's App.</span></p>
            
            <form id="formCadastro">
                <input type="text" id="nome" name="nome" placeholder="Full Name" required>
                
                <input type="email" id="email" name="email" placeholder="E-mail" required>
                
                <input type="password" id="password" name="password" placeholder="Password" required>
                
                <button class="botLogin" type="submit">Register</button>
            </form>

            <p class="texto_dois">Already a member? <a href="/index.html">Login now</a></p>
        </div>
    </main>

    <script src="/cadastro.js"></script>

    <script type="module">
	import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

	createChat({
		webhookUrl: "https://estudostestes.app.n8n.cloud/webhook/5f3516dd-df1d-4a51-b2f0-da0a783ddc3a/chat",
        showWelcomeScreen: true,
        initialMessages: [
            'Olá! Sou o assistente de login. Como posso te ajudar hoje?'
        ],
        i18n: {
            en: {
                inputPlaceholder: 'Digite sua dúvida...',
      }
    }
	});

</script>
</body>
</html>
